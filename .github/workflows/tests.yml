name: Run tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Test website build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build website
        uses: ./.github/workflows/actions/build
      - name: Save artifact
        uses: actions/upload-artifact@v6
        with:
          name: beeps-website-${{ github.head_ref || github.run_id }}
          path: _site
          retention-days: 1
          include-hidden-files: true
  check-links:
    name: Check links
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: beeps-website-${{ github.head_ref || github.run_id }}
      - name: Check links
        uses: JustinBeckwith/linkinator-action@v2
        with:
          paths: "**/*.html"
          cleanUrls: true
          checkFragments: true
